<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro Code Editor - Console + Download</title>

    <!-- CodeMirror CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="editors">
        <div class="editor html-editor">
          <label>HTML</label>
          <textarea id="html" placeholder="Write HTML here..."></textarea>
        </div>
        <div class="editor css-editor">
          <label>CSS</label>
          <textarea id="css" placeholder="Write CSS here..."></textarea>
        </div>
        <div class="editor js-editor">
          <label>JS</label>
          <textarea id="js" placeholder="Write JS here..."></textarea>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <button id="download">💾 Download Project</button>
        <button id="clear">🗑️ Clear All</button>
      </div>

      <!-- NEW: Tabbed Preview/Console -->
      <div class="bottom">
        <div class="tabs">
          <button class="tab active" data-tab="preview">👁️ Preview</button>
          <button class="tab" data-tab="console">📋 Console</button>
        </div>
        <div id="preview" class="tab-content active">
          <iframe id="preview-frame"></iframe>
        </div>
        <div id="console" class="tab-content">
          <div id="console-output"></div>
          <button id="clear-console" class="clear-console">
            Clear Console
          </button>
        </div>
      </div>
    </div>

    <!-- CodeMirror Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
